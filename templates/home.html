<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Matt's webpage</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='site.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="pricing.css">
</head>
<body>


    <h2 id="title">Matt's super awesome amazing website of favourite shows and stuff</h2>
    <div id="directories">
        <a href="/form" id="form">Form</a>
        <a href="/display" id="display">Display</a>
        <a href="/remove" id="remove">Remove</a>
        <a href="/" id="back">Back</a>
    </div>
     {% with messages = get_flashed_messages() %}
    {% if messages %}
        {% for message in messages %}
            <p>{{message}}</p>
        {% endfor %}
    {% endif %}
    {% endwith %}

   {% block body %}
        <div class="pricing-header p-3 pb-md-4 mx-auto text-center">
            <img id="mike" src="{{ url_for('static', filename='michael-jackson.gif') }}" alt="michael jackson">
        </div>
   {% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
